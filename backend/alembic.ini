# Alembic configuration file.
# Defines migration environment and database connection settings.
#
# Alembic provides a framework for SQL database migrations.
# See https://alembic.sqlalchemy.org/en/latest/

# This is the Alembic Config object which provides the values
# of various Alembic elements within the "alembic/" folder.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# compared against the filename pattern used by file_template
# this affects length of the normalised filename, use short names
# for long dir names.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory. By default, only .py files
# are considered as revision files.
# sourceless = false

# When set to "true", this option activates the Environment.configure()
# "compare_type" flag, which will compare types of columns to detect changes.
# compare_type = false

# When set to "true", this option activates the Environment.configure()
# "compare_server_default" flag. This compares server defaults across the
# whole database to detect changes. Requires a database for offline mode.
# compare_server_default = false

# Logging configuration
# Loggers defined here can be used by providing the logging name prefix.
# By default, the level is WARNING; override this in the individual
# sections to configure custom logging levels for each category.
# [loggers]
# sqlalchemy.engine = INFO
# sqlalchemy.pool = INFO

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
