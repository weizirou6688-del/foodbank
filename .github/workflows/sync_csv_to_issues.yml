name: Sync Kanban CSV to GitHub Project

on:
  push:
    paths:
      - ".github/workflows/kanban.csv"
      - ".github/workflows/sync_csv_to_issues.yml"
      - ".github/scripts/sync-kanban-to-project.mjs"
  workflow_dispatch:
    inputs:
      csv_path:
        description: "Path to the kanban CSV file"
        required: false
        default: ".github/workflows/kanban.csv"
      dry_run:
        description: "Validate and log only without changing GitHub data"
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-kanban-to-project
  cancel-in-progress: false

jobs:
  sync-project:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      repository-projects: write
    env:
      CSV_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.csv_path || '.github/workflows/kanban.csv' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      PROJECT_OWNER: ${{ vars.KANBAN_PROJECT_OWNER || github.repository_owner }}
      PROJECT_NUMBER: ${{ vars.KANBAN_PROJECT_NUMBER }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KANBAN_SYNC_TOKEN: ${{ secrets.KANBAN_SYNC_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate project configuration
        run: |
          if [ -z "${PROJECT_NUMBER}" ]; then
            echo "Repository variable KANBAN_PROJECT_NUMBER is required." >&2
            echo "Set KANBAN_PROJECT_NUMBER to your GitHub Project number." >&2
            exit 1
          fi

      - name: Sync kanban CSV to issues and project fields
        run: node .github/scripts/sync-kanban-to-project.mjs
